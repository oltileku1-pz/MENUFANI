<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FANI Barber Shop - Menu Premium e Çmimeve</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Inline temporary loading style to prevent flash of unstyled content */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(212, 175, 55, 0.1);
      border-radius: 50%;
      border-top-color: #d4af37;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
  </div>

  <div class="luxury-bg-pattern"></div>

  <header class="header">
    <div class="header-container">
      <div class="logo-wrapper">
        <!-- Display LogoFANI.png if it exists, otherwise fall back to elegant text -->
        <img id="shopLogo" src="LogoFANI.png" alt="FANI Barber Shop" onerror="this.style.display='none'; document.getElementById('textLogo').style.display='block';">
        <h1 id="textLogo" class="text-logo" style="display: none;">FANI</h1>
      </div>
      <p class="tagline">MENU PREMIUM E ÇMIMEVE</p>
      <div class="gold-divider">
        <div class="line"></div>
        <div class="diamond"></div>
        <div class="line"></div>
      </div>
    </div>
  </header>

  <main class="menu-container">
    <!-- Category Nav Bar (Sticky) -->
    <nav class="category-nav" id="categoryNav">
      <div class="nav-scroll-wrapper" id="navScrollWrapper">
        <!-- Nav items will be dynamically generated -->
      </div>
    </nav>

    <!-- Menu Sections -->
    <section class="menu-sections" id="menuSections">
      <!-- Services will be dynamically generated -->
    </section>

    <!-- Shop Info Card -->
    <section class="info-section">
      <div class="info-card">
        <h2 class="info-title">FANI BARBER SHOP</h2>
        <div class="gold-divider-sub">
          <div class="line-sub"></div>
          <div class="diamond-sub"></div>
          <div class="line-sub"></div>
        </div>

        <div class="info-details">
          <div class="info-item">
            <span class="info-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            </span>
            <div class="info-text">
              <h3>Adresa</h3>
              <p id="shopAddress">-</p>
            </div>
          </div>

          <div class="info-item">
            <span class="info-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
            </span>
            <div class="info-text">
              <h3>Instagram</h3>
              <p><a id="shopInstagram" href="#" target="_blank">-</a></p>
            </div>
          </div>

          <div class="info-item">
            <span class="info-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </span>
            <div class="info-text">
              <h3>Telefoni</h3>
              <p><a id="shopPhone" href="#">-</a></p>
            </div>
          </div>

          <div class="info-item">
            <span class="info-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </span>
            <div class="info-text">
              <h3>Orari i Punës</h3>
              <p id="shopHoursWeekdays">-</p>
              <p id="shopHoursSunday">-</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 FANI Barber Shop. Krijuar për luks dhe saktësi.</p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      fetchMenu();
    });

    async function fetchMenu() {
      try {
        const response = await fetch('/api/menu');
        const data = await response.json();
        renderMenu(data);
        // Hide loader with a smooth transition
        const loader = document.getElementById("loadingScreen");
        loader.style.opacity = "0";
        setTimeout(() => {
          loader.style.display = "none";
        }, 500);
      } catch (error) {
        console.error("Error fetching menu:", error);
      }
    }

    function renderMenu(data) {
      // Set Shop Details
      document.title = `${data.shop.name} - Menuja e Çmimeve`;
      document.getElementById("textLogo").textContent = data.shop.name;
      document.getElementById("shopAddress").textContent = data.shop.address;
      
      const igLink = document.getElementById("shopInstagram");
      igLink.textContent = `@${data.shop.instagram}`;
      igLink.href = `https://instagram.com/${data.shop.instagram}`;

      const phoneLink = document.getElementById("shopPhone");
      phoneLink.textContent = data.shop.phone;
      phoneLink.href = `tel:${data.shop.phone}`;

      document.getElementById("shopHoursWeekdays").textContent = data.shop.workingHours.weekdays;
      document.getElementById("shopHoursSunday").textContent = data.shop.workingHours.sunday;

      // Render Categories Navigation
      const navScrollWrapper = document.getElementById("navScrollWrapper");
      navScrollWrapper.innerHTML = '';
      
      // Render Menu Sections
      const menuSections = document.getElementById("menuSections");
      menuSections.innerHTML = '';

      let activeCategorySet = false;

      data.categories.forEach((category) => {
        // Filter out categories with no visible services
        const visibleServices = category.services.filter(s => s.visible !== false);
        if (visibleServices.length === 0) return;

        // Create Navigation Item
        const navItem = document.createElement("button");
        navItem.className = `nav-item ${!activeCategorySet ? 'active' : ''}`;
        navItem.textContent = category.name;
        navItem.setAttribute("data-target", category.id);
        navItem.onclick = () => scrollToCategory(category.id, navItem);
        navScrollWrapper.appendChild(navItem);
        
        activeCategorySet = true;

        // Create Category Section
        const section = document.createElement("div");
        section.id = category.id;
        section.className = "category-section fade-in";
        
        let servicesHtml = '';
        visibleServices.forEach(service => {
          servicesHtml += `
            <div class="menu-item">
              <div class="item-header">
                <span class="item-name">${service.name}</span>
                <span class="item-leader"></span>
                <span class="item-price">€${parseFloat(service.price).toFixed(2)}</span>
              </div>
            </div>
          `;
        });

        section.innerHTML = `
          <h2 class="category-title">${category.name}</h2>
          <div class="category-divider"></div>
          <div class="services-list">
            ${servicesHtml}
          </div>
        `;
        menuSections.appendChild(section);
      });

      // Highlight categories on scroll
      setupScrollListener();
    }

    function scrollToCategory(id, navBtn) {
      const element = document.getElementById(id);
      if (!element) return;

      const headerOffset = 130;
      const elementPosition = element.getBoundingClientRect().top;
      const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

      // Active state
      document.querySelectorAll(".nav-item").forEach(item => item.classList.remove("active"));
      navBtn.classList.add("active");

      // Scroll smoothly
      window.scrollTo({
        top: offsetPosition,
        behavior: "smooth"
      });

      // Scroll the category nav bar to center active button
      const navWrapper = document.getElementById("navScrollWrapper");
      const scrollLeft = navBtn.offsetLeft - (navWrapper.offsetWidth / 2) + (navBtn.offsetWidth / 2);
      navWrapper.scrollTo({
        left: scrollLeft,
        behavior: "smooth"
      });
    }

    function setupScrollListener() {
      const sections = document.querySelectorAll(".category-section");
      const navItems = document.querySelectorAll(".nav-item");
      const headerOffset = 160;

      window.addEventListener("scroll", () => {
        let current = "";
        sections.forEach(section => {
          const sectionTop = section.offsetTop - headerOffset;
          if (window.pageYOffset >= sectionTop) {
            current = section.getAttribute("id");
          }
        });

        if (current) {
          navItems.forEach(item => {
            item.classList.remove("active");
            if (item.getAttribute("data-target") === current) {
              item.classList.add("active");
              
              // Smooth scroll nav bar to active item
              const navWrapper = document.getElementById("navScrollWrapper");
              const scrollLeft = item.offsetLeft - (navWrapper.offsetWidth / 2) + (item.offsetWidth / 2);
              navWrapper.scrollTo({
                left: scrollLeft,
                behavior: "auto"
              });
            }
          });
        }
      });
    }
  </script>
</body>
</html>
